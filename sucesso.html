<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento Confirmado — DevDrops</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c10;
      --surface: #0d1117;
      --border: #1e2d3d;
      --accent: #00e5ff;
      --accent2: #7b61ff;
      --success: #4ade80;
      --text: #cdd9e5;
      --muted: #4a5568;
      --glow: 0 0 30px rgba(0, 229, 255, 0.18);
      --glow-success: 0 0 40px rgba(74, 222, 128, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Grid BG */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow — verde para sucesso */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(74, 222, 128, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 12, 16, 0.82);
      backdrop-filter: blur(16px);
    }

    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--text); }

    .nav-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--success);
      border: 1px solid rgba(74, 222, 128, 0.3);
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(74, 222, 128, 0.05);
    }

    /* MAIN */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.7s ease both;
    }

    /* linha verde no topo do card */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--success), var(--accent));
    }

    /* ícone animado */
    .icon-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(74, 222, 128, 0.08);
      border: 1px solid rgba(74, 222, 128, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      animation: popIn 0.6s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      box-shadow: var(--glow-success);
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      color: var(--success);
      stroke: var(--success);
    }

    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--success);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 1px solid rgba(74, 222, 128, 0.3);
      padding: 5px 14px;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 20px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 16px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    h1 em {
      font-style: normal;
      background: linear-gradient(90deg, var(--success), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    /* steps */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(74, 222, 128, 0.04);
      border: 1px solid rgba(74, 222, 128, 0.12);
      border-radius: 12px;
      padding: 14px 18px;
      text-align: left;
    }

    .step-num {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--success);
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.25);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-text {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.4;
    }

    .step-text strong {
      color: var(--success);
      font-weight: 700;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.35);
      color: var(--success);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .btn-back:hover {
      background: var(--success);
      color: var(--bg);
      box-shadow: 0 0 24px rgba(74, 222, 128, 0.35);
    }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 32px 24px;
    }

    footer p {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      .card { padding: 40px 24px; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="#">Dev<span>Drops.dev</span></a>
    <span class="nav-badge">✓ pago</span>
  </nav>

  <main>
    <div class="card">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>

      <div class="tag">// pagamento confirmado</div>

      <h1>Tudo <em>certo!</em><br/>Acesso liberado.</h1>

      <p class="desc">
        Seu pagamento foi processado com sucesso.<br/>
        Agora volte ao app e finalize a ativação.
      </p>

      <div class="steps">
        <div class="step">
          <div class="step-num">✓</div>
          <div class="step-text">Volte para o <strong>app no seu computador</strong> e aproveite!</div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>Feito com 💙 &nbsp;·&nbsp; <a href="#">DevDrops</a> &nbsp;·&nbsp; Todos os direitos reservados</p>
  </footer>

</body>
</html>
